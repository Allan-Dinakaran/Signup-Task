<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/profile.css">
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow text-center profile-card">
      <h3 class="mb-3">Welcome 👋</h3>

      <div class="mb-2">
        <label class="form-label fw-bold">Name</label>
        <p id="profileName">Loading...</p>
      </div>

      <div class="mb-2">
        <label class="form-label fw-bold">Email</label>
        <p id="profileEmail"></p>
      </div>

      <div class="mb-2">
        <label class="form-label fw-bold">Age</label>
        <input type="number" id="age" class="form-control text-center" placeholder="Enter your age">
      </div>

      <div class="mb-2">
        <label class="form-label fw-bold">Date of Birth</label>
        <input type="date" id="dob" class="form-control text-center">
      </div>

      <div class="mb-2">
        <label class="form-label fw-bold">Contact</label>
        <input type="tel" id="contact" class="form-control text-center" placeholder="Enter your contact number">
      </div>

      <button id="updateBtn" class="btn btn-primary w-100 mt-3">Update Profile</button>
      <button id="logoutBtn" class="btn btn-danger w-100 mt-2">Logout</button>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/profile.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
